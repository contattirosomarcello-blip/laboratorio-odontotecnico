<!DOCTYPE html>
<html lang="it">
<head><meta charset="UTF-8"><title>Anteprima Admin - Preventivo</title></head>
<body style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; background-color: #f4f4f4; margin: 0; padding: 20px;">
    <div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #e0e0e0;">
        <!-- Header (Blu Scuro per Preventivi) -->
        <div style="background-color: #0a192f; padding: 20px; text-align: center;">
            <img src="https://raw.githubusercontent.com/contattirosomarcello-blip/laboratorio-odontotecnico/main/foto/logo%20marcello.jpeg" alt="Laboratorio Roso Marcello" style="max-width: 100px; border-radius: 50%; border: 3px solid white; margin-bottom: 10px;">
            <h2 style="color: #ffffff; margin: 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px;">💰 Nuova Richiesta di Preventivo</h2>
        </div>
        
        <div style="padding: 30px;">
            <!-- Info Table -->
            <table width="100%" style="border-collapse: collapse; margin-bottom: 20px;">
                <tr>
                    <td style="padding: 10px 0; border-bottom: 1px solid #eee; color: #7f8c8d; width: 120px;"><strong>Nome:</strong></td>
                    <td style="padding: 10px 0; border-bottom: 1px solid #eee; color: #2c3e50; font-weight: 600;">{{ params.name }}</td>
                </tr>
                <tr>
                    <td style="padding: 10px 0; border-bottom: 1px solid #eee; color: #7f8c8d;"><strong>Email:</strong></td>
                    <td style="padding: 10px 0; border-bottom: 1px solid #eee;"><a href="mailto:{{ params.email }}" style="color: #0088cc; text-decoration: none;">{{ params.email }}</a></td>
                </tr>
                <tr>
                    <td style="padding: 10px 0; border-bottom: 1px solid #eee; color: #7f8c8d;"><strong>Telefono:</strong></td>
                    <td style="padding: 10px 0; border-bottom: 1px solid #eee;"><a href="tel:{{ params.phone }}" style="color: #0088cc; text-decoration: none;">{{ params.phone }}</a></td>
                </tr>
            </table>

            <!-- Message Box -->
            <div style="background-color: #f9f9f9; border-left: 4px solid #0088cc; padding: 15px; border-radius: 4px;">
                <p style="margin: 0 0 5px 0; font-size: 12px; color: #95a5a6; text-transform: uppercase; font-weight: bold;">Dettagli richiesti</p>
                <p style="margin: 0; color: #333; font-style: italic;">"{{ params.notes }}"</p>
            </div>

            <!-- Actions -->
            <div style="margin-top: 30px; text-align: center;">
                <a href="mailto:{{ params.email }}" style="background-color: #0a192f; color: #ffffff; padding: 12px 25px; text-decoration: none; border-radius: 4px; font-size: 14px; margin-right: 10px; display: inline-block;">Invia Preventivo</a>
                <a href="tel:{{ params.phone }}" style="background-color: #ffffff; color: #0a192f; border: 1px solid #0a192f; padding: 11px 24px; text-decoration: none; border-radius: 4px; font-size: 14px; display: inline-block;">Chiama</a>
            </div>
        </div>
        
        <!-- Footer -->
        <div style="background-color: #ecf0f1; padding: 15px; text-align: center; font-size: 12px; color: #7f8c8d;">
            Ricevuto tramite il modulo di contatto del sito web.
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    .email-body { font-family: 'Poppins', 'Segoe UI', sans-serif; line-height: 1.6; color: #1e293b; max-width: 600px; margin: 0 auto; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .header { background-color: #005f8d; color: #ffffff; padding: 30px; text-align: center; }
    .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ffffff; margin-bottom: 10px; }
    .content { padding: 30px; background-color: #ffffff; }
    .footer { background-color: #f8fafc; color: #64748b; padding: 20px; text-align: center; font-size: 12px; }
    .details-box { background-color: #f1f5f9; border-radius: 8px; padding: 20px; margin-top: 20px; }
    .details-row { display: flex; margin-bottom: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; }
    .label { font-weight: bold; width: 130px; color: #005f8d; }
    .btn { display: inline-block; padding: 12px 25px; background-color: #005f8d; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="email-body">
    <div class="header">
      <img src="https://raw.githubusercontent.com/contattirosomarcello-blip/laboratorio-odontotecnico/main/foto/logo%20marcello.jpeg" class="logo-img">
      <h1 style="margin:0; font-size: 20px;">Laboratorio Roso Marcello</h1>
    </div>
    <div class="content" style="text-align: center;">
      <h2 style="color: #005f8d; margin-top:0;">Ricezione Richiesta</h2>
      <p>Gentile <strong><?= data.name ?></strong>, abbiamo ricevuto correttamente la tua richiesta.</p>
      
      <div class="details-box" style="text-align: left;">
        <div class="details-row"><span class="label">🛠 Oggetto:</span> <span><?= data.reason ?></span></div>
        <div class="details-row"><span class="label">📅 Data/Ora:</span> <span><?= data.date ?></span></div>
        <? if (data.notes) { ?>
          <div class="details-row" style="border:none;"><span class="label">📝 Note:</span> <span><?= data.notes ?></span></div>
        <? } ?>
      </div>

      <p style="margin-top: 25px; font-size: 14px;">Il nostro team esaminerà i dettagli e ti ricontatterà al più presto.</p>
      <a href="https://labodontoroso.it" class="btn">Vai al Sito</a>
    </div>
    <div class="footer">
      Corso Regio Parco, 168 - Torino | Tel: 338 1731927
    </div>
  </div>
</body>
</html>

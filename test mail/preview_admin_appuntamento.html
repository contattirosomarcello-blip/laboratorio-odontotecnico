<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    .email-body { font-family: 'Poppins', 'Segoe UI', sans-serif; line-height: 1.6; color: #1e293b; max-width: 600px; margin: 0 auto; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
    .header { background-color: #005f8d; color: #ffffff; padding: 30px; text-align: center; }
    .logo-img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ffffff; margin-bottom: 10px; }
    .content { padding: 30px; background-color: #ffffff; }
    .footer { background-color: #f8fafc; color: #64748b; padding: 15px; text-align: center; font-size: 12px; }
    .details-box { background-color: #f1f5f9; border-radius: 8px; padding: 20px; margin: 20px 0; }
    .details-row { margin-bottom: 8px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; font-size: 14px; }
    .label { font-weight: bold; color: #005f8d; width: 110px; display: inline-block; }
    .btn-group { text-align: center; margin-top: 25px; }
    .btn { display: inline-block; padding: 12px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 14px; margin: 5px; }
    .btn-primary { background-color: #005f8d; color: #ffffff !important; }
    .btn-whatsapp { background-color: #25d366; color: #ffffff !important; }
  </style>
</head>
<body>
  <div class="email-body">
    <div class="header">
      <img src="https://raw.githubusercontent.com/contattirosomarcello-blip/laboratorio-odontotecnico/main/foto/logo%20marcello.jpeg" class="logo-img">
      <h2 style="margin:0; text-transform: uppercase; letter-spacing: 1px;">Nuovo Appuntamento</h2>
    </div>
    <div class="content">
      <p>Ciao Marcello, hai ricevuto una nuova prenotazione dal sito.</p>
      
      <div class="details-box">
        <div class="details-row"><span class="label">👤 Cliente:</span> <?= data.name ?></div>
        <div class="details-row"><span class="label">📞 Telefono:</span> <?= data.phone ?></div>
        <div class="details-row"><span class="label">📧 Email:</span> <?= data.email ?></div>
        <div class="details-row"><span class="label">🛠 Servizio:</span> <?= data.reason ?></div>
        <div class="details-row"><span class="label">Data/Ora:</span> <strong><?= data.date ?></strong></div>
        <? if (data.notes) { ?>
          <div class="details-row" style="border:none;"><span class="label">📝 Note:</span> <em><?= data.notes ?></em></div>
        <? } ?>
      </div>

      <div class="btn-group">
        <a href="<?= data.whatsappUrl ?>" class="btn btn-whatsapp">💬 WhatsApp</a>
        <a href="<?= data.telUrl ?>" class="btn btn-primary">📞 Chiama</a>
      </div>
    </div>
    <div class="footer">
      Notifica Automatica | Laboratorio Roso Marcello
    </div>
  </div>
</body>
</html>

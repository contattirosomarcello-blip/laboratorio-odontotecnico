<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Test Invio Email | Laboratorio Roso</title>
    <style>
        body { font-family: 'Poppins', sans-serif; padding: 50px; text-align: center; background: #f8fafc; }
        .test-box { background: white; border: 2px solid #005f8d; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        button { background: #005f8d; color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s; }
        button:hover { background: #0088cc; transform: translateY(-2px); }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 15px; width: 280px; text-align: center; }
        #result { margin-top: 20px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="test-box">
        <h2 style="color: #005f8d;">Test Sistema Email</h2>
        <p>Inserisci la tua mail per simulare una richiesta dal sito:</p>
        <input type="email" id="test-email" placeholder="tua-email@esempio.it"><br>
        <button id="run-test">Simula Invio Form</button>
        <p id="result"></p>
    </div>

    <script>
        document.getElementById('run-test').addEventListener('click', async () => {
            const email = document.getElementById('test-email').value;
            if (!email || !email.includes('@')) { alert("Inserisci un'email valida!"); return; }

            const resEl = document.getElementById('result');
            resEl.textContent = "⏳ Comunicazione con Render in corso...";
            resEl.style.color = "#64748b";

            const payload = new URLSearchParams({
                request_type: 'appuntamento',
                name: 'Mario Rossi (Test Utente)',
                phone: '3331234567',
                email: email,
                reason: 'riparazione',
                date: '20/05/2026 alle ore 15:30',
                notes: 'Test tecnico per verifica recapito email.',
                user_category: 'privato'
            });

            try {
                const response = await fetch('https://laboratorio-odontotecnico.onrender.com/api/prenotazioni', {
                    method: 'POST',
                    body: payload
                });
                const data = await response.json();
                if (data.status === 'success') {
                    resEl.style.color = '#10b981';
                    resEl.textContent = "✅ Successo! Il server ha risposto OK. Ora controlla la tua posta (anche Spam).";
                } else {
                    throw new Error(data.message || "Errore sconosciuto");
                }
            } catch (err) {
                resEl.style.color = '#ef4444';
                resEl.textContent = "❌ Errore: " + err.message;
            }
        });
    </script>
</body>
</html>
